<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;color:#e8edf8;}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .8s ease;}
#lobby.hidden{opacity:0;pointer-events:none;}

.lobby-floor{position:absolute;bottom:0;left:0;right:0;height:38%;background:linear-gradient(to bottom,#0a0a12,#111122);}
.lobby-ceiling{position:absolute;top:0;left:0;right:0;height:28%;background:#050508;}
.lobby-wall{position:absolute;top:28%;left:0;right:0;bottom:38%;background:#0a0a14;}

/* perspective floor tiles */
.floor-tiles{position:absolute;bottom:0;left:0;right:0;height:38%;overflow:hidden;}
.floor-tiles svg{width:100%;height:100%;}

/* spotlight from ceiling */
.spotlight{position:absolute;top:0;left:50%;transform:translateX(-50%);width:400px;height:100%;background:radial-gradient(ellipse 200px 600px at 50% 0%,rgba(255,240,180,0.07) 0%,transparent 70%);pointer-events:none;}

/* title plate */
.lobby-title{position:relative;z-index:2;text-align:center;margin-bottom:3rem;}
.lobby-title h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:.08em;color:#fff;text-shadow:0 0 60px rgba(59,130,246,.4);}
.lobby-title p{color:#6b8ab5;font-size:1rem;letter-spacing:.2em;text-transform:uppercase;margin-top:.5rem;}

/* gallery doors */
.doors{position:relative;z-index:2;display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;max-width:900px;}
.door{width:110px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.6rem;transition:transform .2s;}
.door:hover{transform:translateY(-4px);}
.door-frame{width:100%;aspect-ratio:2/3;border:2px solid #1e3a5f;border-radius:4px 4px 0 0;position:relative;background:#050510;overflow:hidden;transition:border-color .3s,box-shadow .3s;}
.door:hover .door-frame{border-color:#3b82f6;box-shadow:0 0 20px rgba(59,130,246,.3);}
.door-inner{position:absolute;inset:6px;border:1px solid #0f1e35;border-radius:2px;}
.door-knob{position:absolute;right:10px;top:50%;width:6px;height:6px;border-radius:50%;background:#3b82f6;transform:translateY(-50%);}
.door-light{position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:4px;background:rgba(59,130,246,.4);filter:blur(4px);}
.door-number{font-size:.65rem;color:#3b82f6;letter-spacing:.15em;text-transform:uppercase;}
.door-label{font-size:.7rem;color:#6b8ab5;text-align:center;letter-spacing:.05em;}

/* ── ROOM ── */
#room{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .6s ease;}
#room.visible{opacity:1;pointer-events:all;}

.room-ceiling{height:80px;background:#050508;position:relative;flex-shrink:0;}
.room-floor{height:80px;background:linear-gradient(to bottom,#0a0a12,#080810);flex-shrink:0;position:relative;}
.room-walls{flex:1;background:#08080f;position:relative;overflow:hidden;}

/* spotlight cone in room */
.room-spot{position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:100%;background:radial-gradient(ellipse 250px 700px at 50% -10%,rgba(255,240,180,0.08) 0%,transparent 65%);pointer-events:none;}

/* back button */
.back-btn{position:fixed;top:1.5rem;left:1.5rem;z-index:20;background:rgba(0,0,0,.7);border:1px solid #1e3a5f;color:#6b8ab5;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-size:.8rem;letter-spacing:.08em;transition:all .2s;}
.back-btn:hover{border-color:#3b82f6;color:#93c5fd;}

.room-label{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:20;font-size:.7rem;color:#3b82f6;letter-spacing:.2em;text-transform:uppercase;}

/* ── CONTENT INSIDE ROOM ── */
.room-content{position:absolute;inset:0;overflow-y:auto;padding:2rem 2rem 3rem;scrollbar-width:thin;scrollbar-color:#1e3a5f #000;}
.room-content::-webkit-scrollbar{width:4px;}
.room-content::-webkit-scrollbar-track{background:#000;}
.room-content::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px;}

/* ── FRAMES ── */
.frame{background:#030308;border:3px solid #1a1a2e;border-radius:2px;position:relative;padding:1.5rem;max-width:700px;margin:0 auto 2.5rem;}
.frame::before{content:'';position:absolute;inset:-8px;border:1px solid #0f1e35;border-radius:4px;pointer-events:none;}
.frame-spot{position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:120px;height:60px;background:radial-gradient(ellipse 60px 50px at 50% 0%,rgba(255,240,180,0.15),transparent);pointer-events:none;}

/* placard */
.placard{background:#070710;border:1px solid #1e3a5f;border-radius:2px;padding:1rem 1.25rem;margin:0 auto 1.5rem;max-width:700px;position:relative;}
.placard::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:30px;height:2px;background:#3b82f6;opacity:.4;}
.placard-num{font-size:.65rem;color:#3b82f6;letter-spacing:.2em;margin-bottom:.25rem;}
.placard-title{font-size:1rem;font-weight:700;margin-bottom:.15rem;}
.placard-sub{font-size:.78rem;color:#6b8ab5;}

/* section title in frame */
.frame-title{font-size:.65rem;color:#3b82f6;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;}
.section-title-big{font-size:1.6rem;font-weight:800;margin-bottom:.3rem;}
.section-line{width:36px;height:2px;background:linear-gradient(90deg,#1d4ed8,#3b82f6);margin-bottom:1.5rem;}

/* typography */
p.body{color:#6b8ab5;font-size:.9rem;line-height:1.7;margin-bottom:.9rem;}
.tag{display:inline-block;background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.2);padding:.2rem .65rem;border-radius:20px;font-size:.75rem;margin:.2rem .15rem;}

/* skills grid */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;}
.skill-card{background:#060612;border:1px solid #0f1e35;border-radius:8px;padding:1rem;}
.skill-card h4{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#3b82f6;margin-bottom:.5rem;}
.skill-card p{color:#6b8ab5;font-size:.82rem;}

/* timeline */
.tl{display:flex;flex-direction:column;gap:0;}
.tl-item{display:grid;grid-template-columns:120px 1fr;gap:1.25rem;padding-bottom:1.5rem;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:119px;top:6px;bottom:0;width:1px;background:#0f1e35;}
.tl-dot{position:absolute;left:113px;top:5px;width:12px;height:12px;border-radius:50%;background:#1d4ed8;border:2px solid #000;}
.tl-date{color:#6b8ab5;font-size:.75rem;text-align:right;padding-top:.1rem;}
.tl-content h4{font-weight:700;font-size:.88rem;margin-bottom:.1rem;}
.tl-content .org{color:#3b82f6;font-size:.8rem;margin-bottom:.3rem;}
.tl-content p,.tl-content li{color:#6b8ab5;font-size:.82rem;}
.tl-content ul{margin-left:1rem;}
.tl-content li{margin-bottom:.2rem;}

/* projects scroll */
.proj-scroll{display:flex;gap:1.25rem;overflow-x:auto;padding-bottom:1rem;cursor:grab;scrollbar-width:none;}
.proj-scroll::-webkit-scrollbar{display:none;}
.proj-card{min-width:280px;max-width:280px;background:#060612;border:1px solid #0f1e35;border-radius:8px;padding:1.25rem;flex-shrink:0;transition:border-color .2s;}
.proj-card:hover{border-color:#1d4ed8;}
.proj-title{font-weight:700;font-size:.88rem;margin-bottom:.25rem;}
.proj-date{color:#6b8ab5;font-size:.72rem;margin-bottom:.6rem;}
.proj-desc{color:#6b8ab5;font-size:.8rem;margin-bottom:.75rem;padding-left:.9rem;}
.proj-desc li{margin-bottom:.2rem;}
.proj-tags{display:flex;flex-wrap:wrap;gap:.3rem;}
.proj-tag{background:rgba(29,78,216,.1);color:#6b8ab5;border:1px solid #0f1e35;padding:.15rem .5rem;border-radius:4px;font-size:.7rem;}

/* extras */
.extra-card{background:#060612;border:1px solid #0f1e35;border-radius:8px;padding:1rem 1.25rem;margin-bottom:.8rem;}
.extra-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.25rem;}
.extra-title{font-weight:700;font-size:.85rem;}
.extra-date{color:#6b8ab5;font-size:.72rem;white-space:nowrap;margin-left:.75rem;}
.extra-org{color:#3b82f6;font-size:.78rem;margin-bottom:.3rem;}
.extra-desc{color:#6b8ab5;font-size:.8rem;}
.extra-link{color:#3b82f6;font-size:.78rem;text-decoration:none;display:inline-block;margin-top:.3rem;}

/* contact */

.c-btn svg{width:22px;height:22px;fill:#6b8ab5;transition:fill .2s;}

.fun-row .hi{color:#93c5fd;font-weight:600;}
.fun-row img{width:18px;height:18px;border-radius:3px;}
</style>

function openRoom(id) {
  const r = rooms[id];
  document.getElementById('room-content').innerHTML = r.html;
  document.getElementById('room-label').textContent = r.label;
  document.getElementById('room-label').style.display = 'block';
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('lobby').classList.add('hidden');
  const room = document.getElementById('room');
  room.classList.add('visible');

  // drag-to-scroll for projects
  const ps = document.getElementById('ps');
  if (ps) {
    let down = false, sx, sl;
    ps.addEventListener('mousedown', e => { down=true; sx=e.pageX-ps.offsetLeft; sl=ps.scrollLeft; ps.style.cursor='grabbing'; });
    ps.addEventListener('mouseleave', () => { down=false; ps.style.cursor='grab'; });
    ps.addEventListener('mouseup', () => { down=false; ps.style.cursor='grab'; });
    ps.addEventListener('mousemove', e => { if(!down) return; e.preventDefault(); ps.scrollLeft = sl-(e.pageX-ps.offsetLeft-sx)*1.5; });
  }
}

function closeRoom() {
  document.getElementById('room').classList.remove('visible');
  document.getElementById('room-label').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  const lobby = document.getElementById('lobby');
  lobby.classList.remove('hidden');
}
